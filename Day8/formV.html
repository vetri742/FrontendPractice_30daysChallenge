<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <div class="container  my-5 bg-dark text-light py-5">
        <div class="row py-3 px-3 ">
            <div class="col-12">
                <form action="">
                    <div class="row my-3 ">
                        <div class="col-4">
                        
                            <input type="text" placeholder="Enter Name"  class="w-100 px-3 py-3" required pattern="^[a-zA-Z\s'-]+$ ">
                        </div>
                        <div class="col-4">
                            
                            <input type="email" placeholder="Email" class="w-100 px-3 py-3">
                        </div>
                    </div>
                    <div class="row my-3">
                        <div class="col-4">
                         
                            <input type="number" placeholder="Enter Number" class=" w-100 px-3 py-3" pattern="^\d{10}$
">
                        </div>
                    </div>
                    <div class="row my-3">
                        <div class="col-6">
                            <textarea name="" id="" placeholder="Message" rows="4" class="w-100 px-3"></textarea>
                        </div>
                        
                    </div>
                    <div class="row my-3">
                        <div class="col-4">
                            <input type="submit" class="btn btn-danger w-100 py-3">
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
    
</body>
</html>
