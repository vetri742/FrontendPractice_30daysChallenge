<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration page</title>
    <link rel="stylesheet" href="./bootstrap.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-6">
                <div class="row justify-content-center">
                    <div class="col-6"> <h2>Registration</h2></div>
                </div>
                <div class="row justify-content-center ml-2 text-success">
                    <div class="col-6"> <p>Create your Account</p></div>
                </div>
            <div class="row mt-3">
                <div class="col-6">
                        <input type="text" placeholder="First Name" class="form-control">
                </div>
                <div class="col-6">
                        <input type="text" placeholder="Last Name" class="form-control">
                </div>
                
            </div>
            <div class="row mt-4">
                <div class="col-6">
                    <input type="email" placeholder="Email Address" class="form-control">
                </div>
                <div class="col-6">
                    <input type="number" placeholder="Phone Number" class="form-control">
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-6">
                    <input type="password" placeholder="passworrd" class="form-control"  >
                </div>
                <div class="col-6">
                    <input type="password" placeholder="Confirm Password" class="form-control"  >
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-6"
                    <label class="form-label">Select Your Country</label>
                     <select class="form-select w-80%"> 
                        <option >Country</option>
                        <option>Italy</option>
                        <option>India</option>
                        <option>Austria</option>
                        <option>England</option>
                    </select>
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-6">
                    <p>Terms and Condition</p>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <input type="checkbox" class="form-check-input">
                    <label class="form-check-label"> I agree to the Terms and Condition</label>
                </div>
            </div>
            <div class="row mt-2 ">
                <div class="col-12">
                    <input type="submit" class="btn btn-success w-100" value="Register">

                </div>
            </div>
            <div class="row mt-2 justify-content-center">
                <div class="col-6">
                    <p>Already have an account ? <a href="#">Login</a></p>
                </div>
            </div>


            </div>
        </div>
    </div>
    
</body>
</html>
